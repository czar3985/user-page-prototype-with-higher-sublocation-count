<div class="edit-profile-shell">
    <aside class="edit-profile-sidebar">
        <button (click)="saveAndExit()" class="save-btn" color="primary" mat-flat-button>Save & Exit</button>
        <button (click)="discardAndExit()" class="discard-btn" color="warn" mat-stroked-button>Discard & Exit</button>
    </aside>
    @if (state$ | async; as state) {
        <main class="edit-profile-content">
            <h1>{{ title$ | async }}</h1>
            @if (state.error) {
                <mat-card class="error-card">{{ state.error }}</mat-card>
            }
            <mat-card>
                <mat-card-title>Profile Details</mat-card-title>
                <mat-card-content>
                    <form [formGroup]="form" class="profile-form">
                        <mat-form-field appearance="outline">
                            <mat-label>First Name</mat-label>
                            <input formControlName="firstName" matInput/></mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Last Name</mat-label>
                            <input formControlName="lastName" matInput/></mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Email</mat-label>
                            <input formControlName="email" matInput type="email"/></mat-form-field>
                        <app-location-typeahead (optionSelected)="selectPrimaryLocation($event)"
                                                (searchChanged)="facade.queuePrimarySearch($event)"
                                                [control]="form.controls.primaryLocationSearch"
                                                [options]="state.primaryLocationOptions"
                                                label="Primary location"/>
                    </form>
                </mat-card-content>
            </mat-card>
            <mat-card>
                <mat-card-title>Accessible Locations</mat-card-title>
                <mat-card-content class="accessible-locations-card-content">
                    <app-location-typeahead
                            (optionToggled)="facade.toggleAccessibleLocation($event.option.id, $event.linked)"
                            (searchChanged)="facade.queueAccessibleSearch($event)"
                            [control]="form.controls.accessibleLocationSearch"
                            [options]="state.accessibleLocationOptions"
                            [selectableWithCheckbox]="true"
                            additionalHint="A sub location can only be selected if the parent location is selected. Linking the parent location does not automatically link all sub-locations."
                            label="Search accessible locations"/>
                    <app-accessible-locations-table
                            (locationToggled)="facade.toggleAccessibleLocation($event.locationId, $event.linked)"
                            (pageChanged)="facade.loadUserParentLocations($event.pageIndex, $event.pageSize)"
                            (sublocationToggled)="facade.toggleAccessibleLocation($event.locationId, $event.linked)"
                            (sublocationsLoadRequested)="facade.loadSublocations($event.locationId, $event.skip, $event.take)"
                            [sublocationsMap]="state.sublocationsMap"
                            [userParentLocations]="state.userParentLocations"/>
                </mat-card-content>
            </mat-card>
        </main>
    }
</div>
