<mat-form-field appearance="outline" class="location-typeahead">
    <mat-label>{{ label }}</mat-label>
    <input (input)="onInput($any($event.target).value)" [formControl]="control" [matAutocomplete]="locationAutocomplete"
           aria-describedby="typeaheadHint" matInput/>
    <mat-icon matSuffix>search</mat-icon>
    <mat-hint id="typeaheadHint">Type at least 3 characters to search. More results load as you scroll.@if (additionalHint) {
        <span class="additional-hint"> {{ additionalHint }}</span>
    }</mat-hint>
    <mat-autocomplete #locationAutocomplete="matAutocomplete" (optionSelected)="onSelected($event)"
                      [displayWith]="displayLocation">
        @for (option of options; track option.id) {
            <mat-option [value]="option" class="location-option">
                @if (selectableWithCheckbox) {
                    <mat-checkbox (change)="optionToggled.emit({ option, linked: $event.checked })" (click)="$event.stopPropagation()"
                                  (keydown)="$event.stopPropagation()"
                                  [checked]="$any(option).isLinkedToUser"/>
                }
                <div class="location-option__content"><strong>{{ option.name }}</strong>@if (getDescription(option)) {
                    <small>{{ getDescription(option) }}</small>
                }</div>
            </mat-option>
        }
    </mat-autocomplete>
</mat-form-field>
